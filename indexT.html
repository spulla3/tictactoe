<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

:root {
    --bg: radial-gradient(circle at top, #0f172a, #020617);
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
    --text: #e2e8f0;
    --accent: #22c55e;
    --accent2: #3b82f6;
}

/* base */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* container */
.container {
    text-align: center;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* title */
h1 {
    margin-bottom: 10px;
    font-weight: 600;
}

/* status pill */
.status {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 999px;
    background: var(--card);
    border: 1px solid var(--border);
    margin-bottom: 20px;
    font-size: 0.9rem;
}

/* board */
.board {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    gap: 12px;
    justify-content: center;
}

/* cell */
.cell {
    width: 110px;
    height: 110px;
    border-radius: 18px;
    background: var(--card);
    border: 1px solid var(--border);
    font-size: 2.8rem;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.25s ease;
}

/* hover glow */
.cell:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 0 15px rgba(59,130,246,0.4);
}

/* click effect */
.cell:active {
    transform: scale(0.95);
}

/* X & O colors */
.cell.x { color: #38bdf8; }
.cell.o { color: #f472b6; }

/* winner */
.winner {
    background: linear-gradient(135deg, #22c55e, #4ade80);
    color: #022c22 !important;
    box-shadow: 0 0 20px #22c55e;
}

/* controls */
.controls {
    margin-top: 20px;
}

button, select {
    margin: 6px;
    padding: 10px 16px;
    border-radius: 999px;
    border: none;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: 0.25s;
}

button:hover, select:hover {
    background: rgba(255,255,255,0.1);
}

/* score */
.score {
    margin-top: 15px;
    font-size: 0.9rem;
    opacity: 0.8;
}

/* responsive */
@media(max-width:500px){
    .board{
        grid-template-columns: repeat(3, 90px);
    }
    .cell{
        width: 90px;
        height: 90px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Tic Tac Toe</h1>

    <div class="status">Player X's Turn</div>

    <div class="board" id="board"></div>

    <div class="controls">
        <select id="mode">
            <option value="pvp">PvP</option>
            <option value="ai">Vs AI</option>
        </select>

        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>

        <button onclick="resetGame()">Restart</button>
    </div>

    <div class="score">
        X: <span id="sx">0</span> | O: <span id="so">0</span>
    </div>
</div>

<script>
let board = Array(9).fill("");
let current = "X";
let active = true;
let sx=0, so=0;

const boardEl = document.getElementById("board");
const status = document.querySelector(".status");

const winCombos = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function init(){
    boardEl.innerHTML="";
    board.forEach((_,i)=>{
        let cell=document.createElement("div");
        cell.className="cell";
        cell.onclick=()=>move(i);
        boardEl.appendChild(cell);
    });
}
init();

function move(i){
    if(board[i]||!active) return;

    board[i]=current;
    render();

    if(checkWin()) return;

    if(board.every(c=>c)){
        status.textContent="Draw!";
        active=false;
        return;
    }

    current=current==="X"?"O":"X";
    status.textContent=`Player ${current}'s Turn`;

    if(document.getElementById("mode").value==="ai" && current==="O"){
        setTimeout(aiMove,300);
    }
}

function render(){
    [...boardEl.children].forEach((c,i)=>{
        c.textContent=board[i];
        c.classList.toggle("x",board[i]==="X");
        c.classList.toggle("o",board[i]==="O");
    });
}

function checkWin(){
    for(let combo of winCombos){
        let [a,b,c]=combo;
        if(board[a] && board[a]===board[b] && board[a]===board[c]){
            active=false;
            combo.forEach(i=>boardEl.children[i].classList.add("winner"));

            if(board[a]==="X"){ sx++; document.getElementById("sx").textContent=sx;}
            else{ so++; document.getElementById("so").textContent=so;}

            status.textContent=`Player ${board[a]} Wins`;
            return true;
        }
    }
    return false;
}

/* AI */
function aiMove(){
    let diff=document.getElementById("difficulty").value;
    let move;

    if(diff==="easy") move=randomMove();
    else if(diff==="medium") move=Math.random()<0.5?bestMove():randomMove();
    else move=bestMove();

    move!==undefined && move!==null && window.move(move);
}

function randomMove(){
    let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
    return empty[Math.floor(Math.random()*empty.length)];
}

function bestMove(){
    let best=-Infinity, move;
    for(let i=0;i<9;i++){
        if(board[i]===""){
            board[i]="O";
            let score=minimax(board,false);
            board[i]="";
            if(score>best){best=score;move=i;}
        }
    }
    return move;
}

function minimax(b,isMax){
    let res=evaluate(b);
    if(res!==null) return res;

    if(isMax){
        let best=-Infinity;
        for(let i=0;i<9;i++){
            if(b[i]===""){
                b[i]="O";
                best=Math.max(best,minimax(b,false));
                b[i]="";
            }
        }
        return best;
    }else{
        let best=Infinity;
        for(let i=0;i<9;i++){
            if(b[i]===""){
                b[i]="X";
                best=Math.min(best,minimax(b,true));
                b[i]="";
            }
        }
        return best;
    }
}

function evaluate(b){
    for(let c of winCombos){
        let [a,b1,c1]=c;
        if(b[a] && b[a]===b[b1] && b[a]===b[c1]){
            return b[a]==="O"?1:-1;
        }
    }
    if(!b.includes("")) return 0;
    return null;
}

function resetGame(){
    board=Array(9).fill("");
    current="X";
    active=true;
    status.textContent="Player X's Turn";
    init();
}
</script>

</body>
</html>
